<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sunspot WASM Test</title>
    <script src="wasm_exec.js"></script>
</head>
<body>
    <h1>Check your Developer Console!</h1>
    <script>
        // 2. Initialize the Go environment
        const go = new Go();
        
        // 3. Fetch and instantiate your compiled WASM
        WebAssembly.instantiateStreaming(fetch("sunspot_bridge.wasm"), go.importObject)
            .then((result) => {
                // 4. Run the Go program (this keeps it alive)
                go.run(result.instance);
                
                console.log("✅ WASM Successfully Loaded!");
                console.log("🔍 Found function:", window.generateSunspotProof);

                // 5. Fire a test shot (It should return your custom error string)
                const testResult = window.generateSunspotProof();
                console.log("Test execution returned:", testResult);
            })
            .catch((err) => {
                console.error("WASM Loading Failed:", err);
            });
    </script>
</body>
</html>
